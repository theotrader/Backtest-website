<style>

  :root {
    --bg: #0e0f11;
    --bg2: #16181c;
    --bg3: #1e2026;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --text2: #8b8fa8;
    --text3: #555a70;
    --accent: #4f8ef7;
    --green: #3ecf8e;
    --red: #f87171;
    --amber: #fbbf24;
    --font: 'IBM Plex Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    min-height: 100vh;
    line-height: 1.5;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .logo span { color: var(--accent); }
  .header-note {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
  }

  /* Layout */
  .layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    min-height: calc(100vh - 57px);
  }

  /* Sidebar */
  aside {
    border-right: 1px solid var(--border);
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }

  .section-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* Ticker input */
  .ticker-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
    min-height: 24px;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px 3px 8px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
  }
  .tag-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .tag-rm { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 15px; padding: 0; line-height: 1; }
  .tag-rm:hover { color: var(--red); }

  .search-wrap { position: relative; }
  input[type=text] {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type=text]:focus { border-color: var(--accent); }
  input[type=text]::placeholder { color: var(--text3); }

  .suggestions {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    z-index: 200;
    max-height: 240px;
    overflow-y: auto;
    display: none;
  }
  .sug-item {
    padding: 8px 12px;
    cursor: pointer;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sug-item:last-child { border-bottom: none; }
  .sug-item:hover, .sug-item.active { background: var(--bg3); }
  .sug-t { font-family: var(--mono); font-weight: 500; color: var(--text); font-size: 12px; }
  .sug-n { color: var(--text2); font-size: 11px; flex: 1; }
  .sug-c { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }

  /* Form controls */
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 5px; }
  select, input[type=number] {
    width: 100%;
    padding: 7px 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
    appearance: none;
    -webkit-appearance: none;

    background-position: right 10px center;
  }
  input[type=number] { background-image: none; }
  select:focus, input[type=number]:focus { border-color: var(--accent); outline: none; }

  .params-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Run button */
  .btn-run {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn-run:active { transform: scale(0.98); }
  .btn-run:disabled { opacity: 0.4; cursor: not-allowed; }

  .divider { border: none; border-top: 1px solid var(--border); }

  /* Main content */
  main {
    padding: 28px 32px;
    overflow-y: auto;
  }

  /* Empty state */
  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text3);

  .empty-icon {
    width: 48px; height: 48px;
    border: 1px solid var(--border2);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  #empty-state p { font-size: 13px; font-family: var(--mono); }

  /* Results */

  .metrics-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;

  .metric-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .metric-label { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-bottom: 4px; }
  .metric-val { font-size: 22px; font-weight: 500; font-family: var(--mono); }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .up { color: var(--green); }
  .dn { color: var(--red); }
  .neutral { color: var(--text); }

    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;

  .chart-title { font-family: var(--mono); font-size: 11px; color: var(--text2); letter-spacing: 0.06em; text-transform: uppercase; }
  .legend {

    flex-wrap: wrap;
    gap: 14px;

  .legend-item { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11px; color: var(--text2); }
  .legend-line { width: 20px; height: 2px; border-radius: 1px; }

  .chart-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    position: relative;
  }

    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead td {
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    border-bottom: 1px solid var(--border);

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg3); }

  .ticker-cell { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-weight: 500; }
  .ticker-dot { width: 7px; height: 7px; border-radius: 50%; }

    background: rgba(248,113,113,0.08);

  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>

function genPrices(s0,ar,av,n,seed,ca,cm,rs){
  let rng=seed;
  function rand(){rng=(rng*16807)%2147483647;return(rng-1)/2147483646;}
  function randn(){return Math.sqrt(-2*Math.log(rand()+1e-10))*Math.cos(2*Math.PI*rand());}
  const wr=ar/52,wv=av/Math.sqrt(52);
  const px=[s0],hi=[s0*1.01];
  for(let i=1;i<n;i++){
    let r=wr+wv*randn();
    if(ca&&i>=ca&&i<ca+8)r-=cm/8;
    if(ca&&i>=ca+8&&i<ca+20)r+=(cm*rs)/12;
    const p=Math.max(px[i-1]*(1+r),0.01);
    px.push(p);hi.push(p*(1+Math.abs(wv*rand()*0.5)));
  }
  return{px,hi};
}
function makeWeeklyDates(n){
  const dates=[],start=new Date('2015-01-05');
  for(let i=0;i<n;i++){const d=new Date(start);d.setDate(d.getDate()+i*7);dates.push(d.toLocaleDateString('nl-NL',{year:'numeric',month:'short'}));}
  return dates;
}

const TYPES={
  buyhold:{label:'Buy & Hold',params:[]},
  sma:{label:'SMA Crossover',params:[{n:'short',l:'Kort (weken)',d:4,mn:2,mx:26},{n:'long',l:'Lang (weken)',d:13,mn:4,mx:52}]},
  ema:{label:'EMA Trend',params:[{n:'period',l:'Periode (weken)',d:13,mn:4,mx:52}]},
  mom:{label:'Momentum',params:[{n:'lookback',l:'Lookback (weken)',d:26,mn:4,mx:104}]},
  rsi:{label:'RSI Mean Reversion',params:[{n:'rsi_p',l:'RSI periode',d:14,mn:5,mx:30},{n:'oversold',l:'Drempel',d:30,mn:10,mx:50}]},
  macd:{label:'MACD',params:[{n:'fast',l:'Fast (wk)',d:3,mn:2,mx:10},{n:'slow',l:'Slow (wk)',d:7,mn:5,mx:20}]},
  breakout:{label:'Breakout',params:[{n:'period',l:'Periode (weken)',d:20,mn:4,mx:52}]},

let tickers=['SPY','AAPL','MSFT'],charts={},sugIdx=-1,filteredSugs=[];

function renderTags(){
  document.getElementById('ticker-tags').innerHTML=tickers.map((t,i)=>`
    <span class="tag">
      <span class="tag-dot" style="background:${COLORS[i%COLORS.length]}"></span>
      ${t}
      <button class="tag-rm" onclick="removeTicker(${i})">×</button>
    </span>`).join('');
}
function removeTicker(i){tickers.splice(i,1);renderTags();}
function addTicker(sym){
  const s=sym.trim().toUpperCase();
  if(!s)return;
  if(!TD[s]){setErr(`"${s}" niet gevonden. Kies uit de lijst.`);return;}
  if(tickers.includes(s))return;
  tickers.push(s);renderTags();
  document.getElementById('ticker-input').value='';
  hideSugs();setErr('');
}
function onSearch(){
  const q=document.getElementById('ticker-input').value.trim().toLowerCase();
  const box=document.getElementById('suggestions');
  sugIdx=-1;
  if(!q){hideSugs();return;}
  filteredSugs=TICKER_DB.filter(x=>x.t.toLowerCase().includes(q)||x.n.toLowerCase().includes(q)).slice(0,10);
  if(!filteredSugs.length){hideSugs();return;}
  box.innerHTML=filteredSugs.map((x,i)=>`
    <div class="sug-item" onmousedown="addTicker('${x.t}')">
      <span class="sug-t">${x.t}</span>
      <span class="sug-n">${x.n}</span>
      <span class="sug-c">${x.c}</span>
    </div>`).join('');
  box.style.display='block';
}
function hideSugs(){document.getElementById('suggestions').style.display='none';filteredSugs=[];sugIdx=-1;}
function onKey(e){
  const items=document.querySelectorAll('.sug-item');
  if(e.key==='ArrowDown'){sugIdx=Math.min(sugIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('active',i===sugIdx));e.preventDefault();}
  else if(e.key==='ArrowUp'){sugIdx=Math.max(sugIdx-1,0);items.forEach((el,i)=>el.classList.toggle('active',i===sugIdx));e.preventDefault();}
  else if(e.key==='Enter'){if(sugIdx>=0&&filteredSugs[sugIdx])addTicker(filteredSugs[sugIdx].t);else addTicker(document.getElementById('ticker-input').value);}
  else if(e.key==='Escape')hideSugs();
}
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))hideSugs();});

function renderParams(){
  const tid=document.getElementById('strat-type').value;
  const p=TYPES[tid].params;
  document.getElementById('strat-params').innerHTML=p.map(x=>`
    <div class="field">
      <label>${x.l}</label>
      <input type="number" id="p_${x.n}" value="${x.d}" min="${x.mn}" max="${x.mx}">
    </div>`).join('');
}
function getStratParams(){
  const tid=document.getElementById('strat-type').value;
  const params={};
  TYPES[tid].params.forEach(p=>{params[p.n]=parseFloat(document.getElementById('p_'+p.n).value)||p.d;});
  return{tid,params};
}

function sma(a,p){return a.map((_,i)=>i<p-1?null:a.slice(i-p+1,i+1).reduce((x,y)=>x+y,0)/p);}
function ema(a,p){const k=2/(p+1);let r=[null],prev=a[0];for(let i=1;i<a.length;i++){if(i<p){r.push(null);prev=a[i];continue;}const e=a[i]*k+prev*(1-k);r.push(e);prev=e;}return r;}
function rsiCalc(a,p){const r=Array(p).fill(null);for(let i=p;i<a.length;i++){const sl=a.slice(i-p,i+1);let g=0,l=0;for(let j=1;j<sl.length;j++){const d=sl[j]-sl[j-1];d>0?g+=d:l+=Math.abs(d);}const ag=g/p,al=l/p;r.push(al===0?100:100-(100/(1+ag/al)));}return r;}

function getSignal(tid,params,px,hi){
  const n=px.length,sig=Array(n).fill(0);
  if(tid==='buyhold')return Array(n).fill(1);
  if(tid==='mom'){const lb=params.lookback||26;for(let i=lb;i<n;i++)sig[i]=px[i]>px[i-lb]?1:0;}
  else if(tid==='sma'){const s=sma(px,params.short||4),l=sma(px,params.long||13);for(let i=0;i<n;i++)if(s[i]&&l[i])sig[i]=s[i]>l[i]?1:0;}
  else if(tid==='ema'){const e=ema(px,params.period||13);for(let i=0;i<n;i++)if(e[i])sig[i]=px[i]>e[i]?1:0;}
  else if(tid==='rsi'){const r=rsiCalc(px,params.rsi_p||14);const ov=params.oversold||30;let it=0;for(let i=0;i<n;i++){if(r[i]!==null){if(r[i]<ov)it=1;if(r[i]>70)it=0;}sig[i]=it;}}
  else if(tid==='macd'){const f=ema(px,params.fast||3),sl2=ema(px,params.slow||7);const ml=px.map((_,i2)=>(f[i2]&&sl2[i2])?f[i2]-sl2[i2]:null);const ms=ema(ml.map(v=>v||0),3);for(let i=0;i<n;i++)if(ml[i]!==null&&ms[i]!==null)sig[i]=ml[i]>ms[i]?1:0;}
  else if(tid==='breakout'){const p=params.period||20;for(let i=p;i<n;i++){const mh=Math.max(...hi.slice(i-p,i));sig[i]=px[i]>=mh?1:0;}}
  else if(tid==='bb'){const p=params.period||20;for(let i=p;i<n;i++){const sl=px.slice(i-p,i);const mn2=sl.reduce((a,b)=>a+b,0)/p;const std=Math.sqrt(sl.reduce((a,b)=>a+(b-mn2)**2,0)/p);sig[i]=px[i]<mn2-2*std?1:px[i]>mn2+2*std?0:(sig[i-1]||0);}}
  return sig;
}
function backtest(px,sig,tc){
  const eq=[1];
  for(let i=1;i<px.length;i++){
    const ret=(px[i]-px[i-1])/px[i-1];
    eq.push(Math.max(eq[i-1]*(1+(sig[i-1]*ret)-(Math.abs(sig[i]-sig[i-1])*tc)),0.001));
  }
  return eq;
}
function calcM(eq){
  const n=eq.length,tot=eq[n-1]-1;
  const ann=Math.pow(1+tot,52/n)-1;
  const rets=eq.map((v,i)=>i===0?0:(v-eq[i-1])/eq[i-1]);
  const mean=rets.reduce((a,b)=>a+b,0)/n;
  const vol=Math.sqrt(rets.reduce((a,b)=>a+(b-mean)**2,0)/n)*Math.sqrt(52);
  const sharpe=vol>0?ann/vol:0;
  let mdd=0,peak=eq[0];
  for(const v of eq){if(v>peak)peak=v;const dd=(v-peak)/peak;if(dd<mdd)mdd=dd;}
  return{tot,ann,sharpe,mdd};
}

function setErr(m){const e=document.getElementById('err');e.style.display=m?'block':'none';e.textContent=m;}
function fmt(v){return v>=0?'+'+v.toFixed(1)+'%':v.toFixed(1)+'%';}
function fmtE(v,cap){return '€'+Math.round(v*cap).toLocaleString('nl-NL');}

function runAll(){
  if(tickers.length===0){setErr('Voeg minstens één ticker toe!');return;}
  setErr('');
  const periodN=parseInt(document.getElementById('period').value);
  const capital=parseFloat(document.getElementById('capital').value)||10000;
  const tc=parseFloat(document.getElementById('tc').value)||0.0005;
  const {tid,params}=getStratParams();
  const stratLabel=TYPES[tid].label;

  const results=tickers.map((t,i)=>{
    const d=TD[t];
    const px=d.px.slice(-periodN),hi=d.hi.slice(-periodN);
    const sig=getSignal(tid,params,px,hi);
    const eq=backtest(px,sig,tc);
    const m=calcM(eq);
    return{ticker:t,color:COLORS[i%COLORS.length],eq,m};
  });

  const dates=DATES.slice(-periodN);
  document.getElementById('empty-state').style.display='none';
  document.getElementById('results').style.display='block';

  // Best result for metrics header
  const best=results.reduce((a,b)=>b.m.sharpe>a.m.sharpe?b:a);
  document.getElementById('metrics-row').innerHTML=`
    <div class="metric-card">
      <div class="metric-label">beste sharpe</div>
      <div class="metric-val neutral">${best.m.sharpe.toFixed(2)}</div>
      <div class="metric-sub">${best.ticker} — ${stratLabel}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">beste jaarlijks</div>
      <div class="metric-val ${best.m.ann>=0?'up':'dn'}">${fmt(best.m.ann*100)}</div>
      <div class="metric-sub">${best.ticker}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">beste eindwaarde</div>
      <div class="metric-val up">${fmtE(best.eq[best.eq.length-1],capital)}</div>
      <div class="metric-sub">gestart met €${capital.toLocaleString('nl-NL')}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">aantal tickers</div>
      <div class="metric-val neutral">${results.length}</div>
      <div class="metric-sub">${stratLabel}</div>
    </div>
  `;

  // Legend
  document.getElementById('legend').innerHTML=results.map(r=>`
    <div class="legend-item">
      <div class="legend-line" style="background:${r.color}"></div>
      ${r.ticker}
    </div>`).join('');

  // Equity chart
  const eqDS=results.map(r=>({
    label:r.ticker,
    data:r.eq.map(v=>parseFloat((v*capital).toFixed(2))),
    borderColor:r.color,borderWidth:1.8,pointRadius:0,tension:0.3,fill:false
  }));
  if(charts.eq)charts.eq.destroy();
  charts.eq=new Chart(document.getElementById('eqChart'),{
    type:'line',data:{labels:dates,datasets:eqDS},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,
        callbacks:{label:ctx=>`${ctx.dataset.label}: €${Math.round(ctx.parsed.y).toLocaleString('nl-NL')}`}}},
      scales:{
        x:{ticks:{maxTicksLimit:10,color:'#555a70',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'},border:{color:'rgba(255,255,255,0.06)'}},
        y:{ticks:{color:'#555a70',font:{size:11},callback:v=>'€'+Math.round(v).toLocaleString('nl-NL')},grid:{color:'rgba(255,255,255,0.04)'},border:{color:'rgba(255,255,255,0.06)'}}
      }
    }
  });

  // Drawdown chart
  const ddDS=results.map(r=>{
    let peak=r.eq[0];
    const dd=r.eq.map(v=>{if(v>peak)peak=v;return parseFloat(((v-peak)/peak*100).toFixed(2));});
    return{label:r.ticker,data:dd,borderColor:r.color,borderWidth:1.5,pointRadius:0,tension:0.3,fill:true,backgroundColor:r.color+'18'};
  });
  if(charts.dd)charts.dd.destroy();
  charts.dd=new Chart(document.getElementById('ddChart'),{
    type:'line',data:{labels:dates,datasets:ddDS},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,
        callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}%`}}},
      scales:{
        x:{ticks:{maxTicksLimit:10,color:'#555a70',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'},border:{color:'rgba(255,255,255,0.06)'}},
        y:{ticks:{color:'#555a70',font:{size:11},callback:v=>v+'%'},grid:{color:'rgba(255,255,255,0.04)'},border:{color:'rgba(255,255,255,0.06)'}}
      }
    }
  });

  // Table
  const sorted=[...results].sort((a,b)=>b.m.ann-a.m.ann);
  document.getElementById('tbody').innerHTML=sorted.map(r=>`
    <tr>
      <td><div class="ticker-cell"><span class="ticker-dot" style="background:${r.color}"></span>${r.ticker}</div></td>
      <td class="ta-right" style="color:${r.m.tot>=0?'var(--green)':'var(--red)'};font-weight:500">${fmt(r.m.tot*100)}</td>
      <td class="ta-right" style="color:${r.m.ann>=0?'var(--green)':'var(--red)'}">${fmt(r.m.ann*100)}</td>
      <td class="ta-right">${r.m.sharpe.toFixed(2)}</td>
      <td class="ta-right" style="color:var(--red)">${fmt(r.m.mdd*100)}</td>
      <td class="ta-right" style="color:var(--text)">${fmtE(r.eq[r.eq.length-1],capital)}</td>
    </tr>`).join('');
}

renderParams();
